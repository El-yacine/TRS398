<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRS-398 Pro - History</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #f1f5f9;
            --muted: #94a3b8;
            --accent: #10b981;
            --accent-2: #06b6d4;
            --accent-glow: rgba(16, 185, 129, 0.25);
            --surface: #0f172a;
            --card: #1e293b;
            --card-hover: #273548;
            --border: rgba(148, 163, 184, 0.12);
            --bg: #0a0f1c;
            --header-bg: rgba(15, 23, 42, 0.85);
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --gradient-primary: linear-gradient(135deg, #10b981 0%, #06b6d4 100%);
            --radius-md: 12px;
            --radius-lg: 16px;
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
        }
        
        [data-theme="light"] {
            --ink: #1e293b;
            --muted: #64748b;
            --accent: #059669;
            --accent-2: #0891b2;
            --surface: #f8fafc;
            --card: #ffffff;
            --card-hover: #f1f5f9;
            --border: rgba(148, 163, 184, 0.25);
            --bg: #f1f5f9;
            --header-bg: rgba(255, 255, 255, 0.9);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Space Grotesk', system-ui, sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
        }
        
        .app-shell {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background: var(--bg);
            background-image: radial-gradient(ellipse 80% 50% at 50% -20%, var(--accent-glow), transparent);
        }
        
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 28px;
            background: var(--header-bg);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 15px;
        }
        
        .brand span {
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .nav-links {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .nav-btn {
            padding: 10px 16px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--ink);
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            text-decoration: none;
        }
        
        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
            border-color: var(--accent);
        }
        
        .nav-btn.primary {
            background: var(--gradient-primary);
            color: white;
            border: none;
        }
        
        .lang-select {
            width: 70px !important;
            min-width: 70px !important;
        }
        
        .main {
            flex: 1;
            padding: 24px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }
        
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .page-title {
            font-size: 28px;
            font-weight: 700;
        }
        
        .page-title span {
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .stats-bar {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        
        .stat-badge {
            padding: 8px 16px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .stat-badge strong {
            color: var(--accent);
        }
        
        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .search-box {
            flex: 1;
            min-width: 200px;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--card);
            color: var(--ink);
            font-size: 14px;
        }
        
        .search-box:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .filter-select {
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--card);
            color: var(--ink);
            font-size: 14px;
            cursor: pointer;
        }
        
        .table-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }
        
        .table-wrap {
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        
        th {
            background: var(--surface);
            color: var(--muted);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 16px 20px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        
        td {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }
        
        tr:hover {
            background: var(--card-hover);
        }
        
        tr:last-child td {
            border-bottom: none;
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 999px;
            font-weight: 700;
            font-size: 12px;
        }
        
        .status-badge.pass {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
        }
        
        .status-badge.fail {
            background: rgba(239, 68, 68, 0.15);
            color: var(--error);
        }
        
        .mode-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 12px;
        }
        
        .mode-badge.photon {
            background: rgba(59, 130, 246, 0.15);
            color: #3b82f6;
        }
        
        .mode-badge.electron {
            background: rgba(168, 85, 247, 0.15);
            color: #a855f7;
        }
        
        .energy-badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            border-radius: var(--radius-md);
            background: rgba(6, 182, 212, 0.15);
            color: var(--accent-2);
            font-weight: 700;
            font-size: 13px;
        }
        
        .action-btn {
            padding: 8px 14px;
            border-radius: var(--radius-md);
            border: none;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        
        .action-btn.pdf {
            background: var(--gradient-primary);
            color: white;
        }
        
        .action-btn.pdf:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px var(--accent-glow);
        }
        
        .action-btn.delete {
            background: rgba(239, 68, 68, 0.15);
            color: var(--error);
        }
        
        .action-btn.delete:hover {
            background: var(--error);
            color: white;
        }
        
        .actions-cell {
            display: flex;
            gap: 8px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .empty-state h3 {
            font-size: 18px;
            color: var(--ink);
            margin-bottom: 8px;
        }
        
        .user-cell {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 12px;
        }
        
        .date-cell {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        
        .date-main {
            font-weight: 600;
        }
        
        .date-time {
            font-size: 12px;
            color: var(--muted);
        }
        
        @media (max-width: 768px) {
            .main {
                padding: 16px;
            }
            
            .app-header {
                padding: 12px 16px;
                flex-wrap: wrap;
                gap: 12px;
            }
            
            .nav-links {
                width: 100%;
                justify-content: center;
            }
            
            .page-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            th, td {
                padding: 12px;
            }
            
            .actions-cell {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <header class="app-header">
            <div class="brand">
                📋 <span>TRS-398 Pro</span> <span id="brandSuffix">History</span>
            </div>
            <nav class="nav-links">
                <a href="dashboard.html" class="nav-btn" id="navDashboard">📊 Dashboard</a>
                <a href="index.html" class="nav-btn primary" id="navNewCalibration">📝 New Calibration</a>
                <button class="nav-btn" onclick="toggleTheme()">🌓 <span id="themeLabel">Dark</span></button>
                <select class="nav-btn lang-select" id="langSelect" onchange="setLanguage(this.value)">
                    <option value="en">🇬🇧 EN</option>
                    <option value="fr">🇫🇷 FR</option>
                </select>
                <button class="nav-btn" onclick="exportCSV()" id="btnExportCsv">📤 Export CSV</button>
            </nav>
        </header>
        
        <main class="main">
            <div class="page-header">
                <h1 class="page-title">📋 <span id="pageTitle">Measurement History</span></h1>
                <div class="stats-bar">
                    <div class="stat-badge">
                        📊 <span id="labelTotal">Total</span>: <strong id="totalCount">0</strong>
                    </div>
                    <div class="stat-badge">
                        ✅ <span id="labelPass">Pass</span>: <strong id="passCount">0</strong>
                    </div>
                    <div class="stat-badge">
                        ❌ <span id="labelFail">Fail</span>: <strong id="failCount">0</strong>
                    </div>
                </div>
            </div>
            
            <!-- Filter Bar -->
            <div class="filter-bar">
                <input type="search" class="search-box" id="searchInput" placeholder="🔍 Search by user, energy, machine..." oninput="renderHistory()">
                <select class="filter-select" id="modeFilter" onchange="renderHistory()">
                    <option value="all" id="optAllModes">All Modes</option>
                    <option value="Photon">☢️ Photon</option>
                    <option value="Electron">⚡ Electron</option>
                </select>
                <select class="filter-select" id="statusFilter" onchange="renderHistory()">
                    <option value="all" id="optAllStatus">All Status</option>
                    <option value="pass" id="optPass">✅ Pass</option>
                    <option value="fail" id="optFail">❌ Fail</option>
                </select>
                <button class="nav-btn" onclick="loadHistory()" id="btnRefresh">🔄 Refresh</button>
            </div>
            
            <!-- Table -->
            <div class="table-card">
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th id="thDate">Date</th>
                                <th id="thUser">User</th>
                                <th id="thMode">Mode</th>
                                <th id="thEnergy">Energy</th>
                                <th id="thMachine">Machine</th>
                                <th id="thStatus">Status</th>
                                <th id="thDeviation">Deviation</th>
                                <th id="thActions">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="historyBody">
                            <tr>
                                <td colspan="8">
                                    <div class="empty-state">
                                        <div class="empty-state-icon">⏳</div>
                                        <h3 id="loadingText">Loading...</h3>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    
    <script>
        let measurements = [];
        let theme = localStorage.getItem('trs-theme') || 'dark';
        let currentLanguage = localStorage.getItem('trs-language') || 'en';
        
        // Translation dictionary
        const translations = {
            en: {
                // Navigation
                dashboard: "Dashboard",
                newCalibration: "New Calibration",
                exportCsv: "Export CSV",
                
                // Page
                history: "History",
                measurementHistory: "Measurement History",
                
                // Stats
                total: "Total",
                pass: "Pass",
                fail: "Fail",
                
                // Filters
                searchPlaceholder: "🔍 Search by user, energy, machine...",
                allModes: "All Modes",
                allStatus: "All Status",
                refresh: "Refresh",
                
                // Table headers
                date: "Date",
                user: "User",
                mode: "Mode",
                energy: "Energy",
                machine: "Machine",
                status: "Status",
                deviation: "Deviation",
                actions: "Actions",
                
                // Status badges
                statusPass: "PASS",
                statusFail: "FAIL",
                
                // Mode badges
                photon: "Photon",
                electron: "Electron",
                
                // Empty states
                loading: "Loading...",
                noMeasurements: "No measurements yet",
                startCreating: "Start by creating a new calibration",
                noResults: "No results found",
                adjustFilters: "Try adjusting your filters",
                errorLoading: "Error loading history",
                tryAgain: "Please try again",
                
                // Theme
                dark: "Dark",
                light: "Light",
                
                // Confirm
                deleteConfirm: "Are you sure you want to delete this measurement?"
            },
            fr: {
                // Navigation
                dashboard: "Tableau de bord",
                newCalibration: "Nouvel étalonnage",
                exportCsv: "Exporter CSV",
                
                // Page
                history: "Historique",
                measurementHistory: "Historique des mesures",
                
                // Stats
                total: "Total",
                pass: "Conforme",
                fail: "Non conforme",
                
                // Filters
                searchPlaceholder: "🔍 Rechercher par utilisateur, énergie, machine...",
                allModes: "Tous les modes",
                allStatus: "Tous les statuts",
                refresh: "Actualiser",
                
                // Table headers
                date: "Date",
                user: "Utilisateur",
                mode: "Mode",
                energy: "Énergie",
                machine: "Machine",
                status: "Statut",
                deviation: "Écart",
                actions: "Actions",
                
                // Status badges
                statusPass: "CONFORME",
                statusFail: "NON CONFORME",
                
                // Mode badges
                photon: "Photon",
                electron: "Électron",
                
                // Empty states
                loading: "Chargement...",
                noMeasurements: "Aucune mesure",
                startCreating: "Commencez par créer un nouvel étalonnage",
                noResults: "Aucun résultat trouvé",
                adjustFilters: "Essayez d'ajuster vos filtres",
                errorLoading: "Erreur lors du chargement",
                tryAgain: "Veuillez réessayer",
                
                // Theme
                dark: "Sombre",
                light: "Clair",
                
                // Confirm
                deleteConfirm: "Êtes-vous sûr de vouloir supprimer cette mesure?"
            }
        };
        
        function t(key) {
            return translations[currentLanguage]?.[key] || translations['en']?.[key] || key;
        }
        
        function applyTheme() {
            document.body.setAttribute('data-theme', theme);
            document.getElementById('themeLabel').textContent = theme === 'dark' ? t('dark') : t('light');
        }
        
        function toggleTheme() {
            theme = theme === 'dark' ? 'light' : 'dark';
            localStorage.setItem('trs-theme', theme);
            applyTheme();
        }
        
        function setLanguage(lang) {
            currentLanguage = lang;
            localStorage.setItem('trs-language', lang);
            document.getElementById('langSelect').value = lang;
            applyTranslations();
            renderHistory(); // Re-render table with new language
        }
        
        function applyTranslations() {
            // Brand
            document.getElementById('brandSuffix').textContent = t('history');
            
            // Navigation
            document.getElementById('navDashboard').innerHTML = `📊 ${t('dashboard')}`;
            document.getElementById('navNewCalibration').innerHTML = `📝 ${t('newCalibration')}`;
            document.getElementById('btnExportCsv').innerHTML = `📤 ${t('exportCsv')}`;
            
            // Theme label
            document.getElementById('themeLabel').textContent = theme === 'dark' ? t('dark') : t('light');
            
            // Page title
            document.getElementById('pageTitle').textContent = t('measurementHistory');
            
            // Stats
            document.getElementById('labelTotal').textContent = t('total');
            document.getElementById('labelPass').textContent = t('pass');
            document.getElementById('labelFail').textContent = t('fail');
            
            // Search placeholder
            document.getElementById('searchInput').placeholder = t('searchPlaceholder');
            
            // Filter options
            document.getElementById('optAllModes').textContent = t('allModes');
            document.getElementById('optAllStatus').textContent = t('allStatus');
            document.getElementById('optPass').textContent = `✅ ${t('pass')}`;
            document.getElementById('optFail').textContent = `❌ ${t('fail')}`;
            document.getElementById('btnRefresh').innerHTML = `🔄 ${t('refresh')}`;
            
            // Table headers
            document.getElementById('thDate').textContent = t('date');
            document.getElementById('thUser').textContent = t('user');
            document.getElementById('thMode').textContent = t('mode');
            document.getElementById('thEnergy').textContent = t('energy');
            document.getElementById('thMachine').textContent = t('machine');
            document.getElementById('thStatus').textContent = t('status');
            document.getElementById('thDeviation').textContent = t('deviation');
            document.getElementById('thActions').textContent = t('actions');
        }
        
        async function loadHistory() {
            try {
                const resp = await fetch('/api/trs/measurements');
                measurements = await resp.json();
                renderHistory();
                updateStats();
            } catch (e) {
                console.error(e);
                document.getElementById('historyBody').innerHTML = `
                    <tr>
                        <td colspan="8">
                            <div class="empty-state">
                                <div class="empty-state-icon">❌</div>
                                <h3>${t('errorLoading')}</h3>
                                <p>${t('tryAgain')}</p>
                            </div>
                        </td>
                    </tr>
                `;
            }
        }
        
        function updateStats() {
            const total = measurements.length;
            const pass = measurements.filter(m => Math.abs(m.ecart) <= 2.0).length;
            const fail = total - pass;
            
            document.getElementById('totalCount').textContent = total;
            document.getElementById('passCount').textContent = pass;
            document.getElementById('failCount').textContent = fail;
        }
        
        function renderHistory() {
            const tbody = document.getElementById('historyBody');
            
            if (!measurements || measurements.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="8">
                            <div class="empty-state">
                                <div class="empty-state-icon">📭</div>
                                <h3>${t('noMeasurements')}</h3>
                                <p>${t('startCreating')}</p>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }
            
            const searchTerm = (document.getElementById('searchInput').value || '').toLowerCase().trim();
            const modeFilter = document.getElementById('modeFilter').value;
            const statusFilter = document.getElementById('statusFilter').value;
            
            const filtered = measurements.filter(m => {
                // Mode filter
                if (modeFilter !== 'all') {
                    const isPhoton = !m.mode || m.mode === 'Photon' || m.mode.toLowerCase().includes('photon');
                    if (modeFilter === 'Photon' && !isPhoton) return false;
                    if (modeFilter === 'Electron' && isPhoton) return false;
                }
                
                // Status filter
                const isPassing = Math.abs(m.ecart) <= 2.0;
                if (statusFilter === 'pass' && !isPassing) return false;
                if (statusFilter === 'fail' && isPassing) return false;
                
                // Search filter
                if (searchTerm) {
                    const searchFields = [
                        m.userName, m.energy, m.linacName, m.mode, m.chamber
                    ].map(v => (v || '').toLowerCase());
                    if (!searchFields.some(f => f.includes(searchTerm))) return false;
                }
                
                return true;
            });
            
            if (filtered.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="8">
                            <div class="empty-state">
                                <div class="empty-state-icon">🔍</div>
                                <h3>${t('noResults')}</h3>
                                <p>${t('adjustFilters')}</p>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }
            
            tbody.innerHTML = filtered.map(m => {
                const date = new Date(m.date);
                const dateStr = date.toLocaleDateString(currentLanguage === 'fr' ? 'fr-FR' : 'en-US');
                const timeStr = date.toLocaleTimeString(currentLanguage === 'fr' ? 'fr-FR' : 'en-US', { hour: '2-digit', minute: '2-digit' });
                const isPassing = Math.abs(m.ecart) <= 2.0;
                const isPhoton = !m.mode || m.mode === 'Photon' || m.mode.toLowerCase().includes('photon');
                const userInitial = (m.userName || 'U').charAt(0).toUpperCase();
                
                return `
                    <tr>
                        <td>
                            <div class="date-cell">
                                <span class="date-main">${dateStr}</span>
                                <span class="date-time">${timeStr}</span>
                            </div>
                        </td>
                        <td>
                            <div class="user-cell">
                                <div class="user-avatar">${userInitial}</div>
                                <span>${m.userName || 'Unknown'}</span>
                            </div>
                        </td>
                        <td>
                            <span class="mode-badge ${isPhoton ? 'photon' : 'electron'}">
                                ${isPhoton ? `☢️ ${t('photon')}` : `⚡ ${t('electron')}`}
                            </span>
                        </td>
                        <td>
                            <span class="energy-badge">${m.energy || '-'}</span>
                        </td>
                        <td>${m.linacName || '-'}</td>
                        <td>
                            <span class="status-badge ${isPassing ? 'pass' : 'fail'}">
                                ${isPassing ? `✅ ${t('statusPass')}` : `❌ ${t('statusFail')}`}
                            </span>
                        </td>
                        <td>
                            <strong style="color: ${isPassing ? 'var(--success)' : 'var(--error)'}">
                                ${m.ecart >= 0 ? '+' : ''}${m.ecart.toFixed(2)}%
                            </strong>
                        </td>
                        <td>
                            <div class="actions-cell">
                                <button class="action-btn pdf" onclick="exportPdf(${m.id})">
                                    📄 PDF
                                </button>
                                <button class="action-btn delete" onclick="deleteMeasurement(${m.id})">
                                    🗑️
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }
        
        async function deleteMeasurement(id) {
            if (!confirm(t('deleteConfirm'))) return;
            
            try {
                await fetch(`/api/trs/measurements/${id}`, { method: 'DELETE' });
                loadHistory();
            } catch (e) {
                alert('Error deleting measurement');
            }
        }
        
        function exportPdf(id) {
            window.open(`/api/trs/report/${id}`, '_blank');
        }
        
        function exportCSV() {
            window.location.href = '/api/trs/export';
        }
        
        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            
            if (e.key === 't') toggleTheme();
            if (e.key === 'n' || (e.ctrlKey && e.key === 'n')) {
                e.preventDefault();
                window.location.href = 'index.html';
            }
            if (e.ctrlKey && e.key === 'e') {
                e.preventDefault();
                exportCSV();
            }
        });
        
        // Initialize
        document.getElementById('langSelect').value = currentLanguage;
        applyTheme();
        applyTranslations();
        loadHistory();
    </script>
</body>
</html>
