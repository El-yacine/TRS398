<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TRS-398 Pro — Activate</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background:#1A1A1A;
      color: #e8edf4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: #131c2e;
      border: 1px solid rgba(148,163,184,0.12);
      border-radius: 16px;
      padding: 40px 36px 36px;
      box-shadow: 0 24px 48px rgba(0,0,0,0.5);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      flex-shrink: 0;
    }

    .logo-name {
      font-size: 18px;
      font-weight: 700;
      color: #e8edf4;
      line-height: 1.2;
    }

    .logo-name span { color: #E4572E; }
    .logo-version { font-size: 12px; color: #6b7fa3; }

    h1 {
      font-size: 20px;
      font-weight: 600;
      color: #e8edf4;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 14px;
      color: #6b7fa3;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #94a3b8;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .key-input {
      width: 100%;
      padding: 14px 16px;
      background:#1A1A1A;
      border: 1.5px solid rgba(148,163,184,0.15);
      border-radius: 10px;
      color: #e8edf4;
      font-size: 16px;
      font-family: 'Cascadia Code', 'JetBrains Mono', 'Courier New', monospace;
      letter-spacing: 0.08em;
      text-align: center;
      text-transform: uppercase;
      transition: border-color 0.15s;
      outline: none;
    }

    .key-input::placeholder { color: #3a4a65; }
    .key-input:focus { border-color: #E4572E; }
    .key-input.error { border-color: #ef4444; }
    .key-input.success { border-color: #22c55e; }

    .key-hint {
      font-size: 11px;
      color: #4a5a72;
      margin-top: 6px;
      text-align: center;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      background: #E4572E;
      color: #0b1120;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
      font-family: inherit;
    }

    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .msg {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      display: none;
    }

    .msg.error { background: rgba(239,68,68,0.1); color: #fca5a5; border: 1px solid rgba(239,68,68,0.2); }
    .msg.success { background: rgba(34,197,94,0.1); color: #86efac; border: 1px solid rgba(34,197,94,0.2); }

    .divider {
      border: none;
      border-top: 1px solid rgba(148,163,184,0.08);
      margin: 28px 0 22px;
    }

    .footer {
      font-size: 12px;
      color: #4a5a72;
      text-align: center;
      line-height: 1.6;
    }

    .footer strong { color: #6b7fa3; }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(11,17,32,0.3);
      border-top-color: #0b1120;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
    <link rel="stylesheet" href="theme-data-instrument.css">
</head>
<body>

<div class="card">

  <div class="logo">
    <svg class="logo-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="46" stroke="#E4572E" stroke-width="4"/>
      <circle cx="50" cy="50" r="8" fill="#E4572E"/>
      <line x1="50" y1="4" x2="50" y2="24" stroke="#E4572E" stroke-width="4" stroke-linecap="round"/>
      <line x1="50" y1="76" x2="50" y2="96" stroke="#E4572E" stroke-width="4" stroke-linecap="round"/>
      <line x1="4" y1="50" x2="24" y2="50" stroke="#E4572E" stroke-width="4" stroke-linecap="round"/>
      <line x1="76" y1="50" x2="96" y2="50" stroke="#E4572E" stroke-width="4" stroke-linecap="round"/>
      <line x1="18" y1="18" x2="32" y2="32" stroke="#E4572E" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
      <line x1="68" y1="68" x2="82" y2="82" stroke="#E4572E" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    </svg>
    <div>
      <div class="logo-name">TRS-398 <span>Pro</span></div>
      <div class="logo-version">Medical Physics Dosimetry — v2.1.0</div>
    </div>
  </div>

  <h1>Activate Your License</h1>
  <p class="subtitle">Enter the license key you received to unlock TRS-398 Pro.</p>

  <label for="keyInput">License Key</label>
  <input
    id="keyInput"
    class="key-input"
    type="text"
    placeholder="TRS-XXXXX-XXXXX-XXXXX-XXXXX"
    maxlength="29"
    autocomplete="off"
    spellcheck="false"
  />
  <div class="key-hint">Format: TRS-AAAAA-BBBBB-CCCCC-DDDDD</div>

  <div id="msg" class="msg"></div>

  <button class="btn" id="activateBtn" onclick="activate()">
    <span class="spinner" id="spinner"></span>
    <span id="btnLabel">Activate</span>
  </button>

  <hr class="divider">

  <div class="footer">
    Need a license key? Contact your administrator or the TRS-398 Pro team.<br>
    <strong>Each key activates one installation.</strong>
  </div>

</div>

<script>
  const inp = document.getElementById('keyInput');
  const btn = document.getElementById('activateBtn');
  const msg = document.getElementById('msg');
  const spinner = document.getElementById('spinner');
  const btnLabel = document.getElementById('btnLabel');

  // Auto-format as TRS-XXXXX-XXXXX-XXXXX-XXXXX while typing
  inp.addEventListener('input', () => {
    let raw = inp.value.replace(/[^A-Za-z0-9]/g, '').toUpperCase();
    let out = '';
    if (raw.startsWith('TRS')) raw = raw.slice(3);
    // Build groups of 5
    const chunks = [];
    for (let i = 0; i < Math.min(raw.length, 20); i += 5) {
      chunks.push(raw.slice(i, i + 5));
    }
    out = 'TRS-' + chunks.join('-');
    // Don't end with a trailing dash while typing
    inp.value = out.replace(/-$/, '');
    inp.classList.remove('error', 'success');
    showMsg('', '');
  });

  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') activate();
  });

  function showMsg(text, type) {
    msg.textContent = text;
    msg.className = 'msg ' + type;
    msg.style.display = text ? 'block' : 'none';
  }

  async function activate() {
    const key = inp.value.trim();
    if (!key) { inp.focus(); return; }

    btn.disabled = true;
    spinner.style.display = 'block';
    btnLabel.textContent = 'Activating…';
    showMsg('', '');

    try {
      const res = await fetch('/api/license/activate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key })
      });
      const data = await res.json();

      if (res.ok && data.success) {
        inp.classList.add('success');
        showMsg('✓ License activated successfully! Launching application…', 'success');
        btnLabel.textContent = 'Activated!';
        setTimeout(() => { window.location.href = '/'; }, 1200);
      } else {
        inp.classList.add('error');
        showMsg(data.error || 'Activation failed. Please try again.', 'error');
        btn.disabled = false;
        spinner.style.display = 'none';
        btnLabel.textContent = 'Activate';
      }
    } catch {
      showMsg('Connection error. Make sure the application is running.', 'error');
      btn.disabled = false;
      spinner.style.display = 'none';
      btnLabel.textContent = 'Activate';
    }
  }
</script>
</body>
</html>
