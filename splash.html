<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline';">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, 'Inter', sans-serif;
      background: #0b1120;
      color: #e8edf4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      user-select: none;
      overflow: hidden;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: #38bdf8;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .app-name {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.4px;
    }

    .app-sub {
      font-size: 12px;
      color: #6b7fa3;
      margin-top: 2px;
      letter-spacing: 0.02em;
    }

    .spinner-wrap {
      margin-bottom: 18px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #252f45;
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #status {
      font-size: 12px;
      color: #6b7fa3;
      letter-spacing: 0.02em;
    }

    .version {
      position: absolute;
      bottom: 14px;
      font-size: 10px;
      color: #3d4f6e;
    }
  </style>
</head>
<body>

  <div class="logo-wrap">
    <div class="logo-icon">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <path d="M4 20 L8 10 L13 16 L18 7 L24 14"
              stroke="white" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>
    <div>
      <div class="app-name">TRS-398 Pro</div>
      <div class="app-sub">Medical Physics Dosimetry</div>
    </div>
  </div>

  <div class="spinner-wrap">
    <div class="spinner"></div>
  </div>

  <span id="status">Starting server…</span>
  <span class="version">v2.1.0</span>

</body>
</html>
